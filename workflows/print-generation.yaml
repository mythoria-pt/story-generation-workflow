# Mythoria – Print Generation Workflow
# Trigger: Pub/Sub topic mythoria-print-requests
#
# Pub/Sub message (base-64 JSON):
#   For self-print (PDF download): { "storyId": "<uuid>", "runId": "<uuid>", "initiatedBy": "selfService", "delivery": {...} }
#   For print order (physical book): { "storyId": "<uuid>", "runId": "<uuid>" }
#
# Cloud Run base URL (internal API):
#   https://story-generation-workflow-803421888801.europe-west9.run.app
#
main:
  params: [event]

  steps:
    # ───────────────────────────────────────────────
    # 0. Parse event & constants
    # ───────────────────────────────────────────────
    - init:
        assign:
          - payload: ${json.decode(base64.decode(event.data.message.data))}
          - storyId: ${payload.storyId}
          - runId: ${payload.runId}
          - baseUrl: 'https://story-generation-workflow-803421888801.europe-west9.run.app'
          - now: ${time.format(sys.now())}
          - initiatedBy: ${default(map.get(payload, "initiatedBy"), "printOrder")}
          - delivery: ${default(map.get(payload, "delivery"), null)}
          - qaAlertSent: false
          - qaSkip: ${default(map.get(payload, "skipQA"), false)}
          - activePrintResult: null
          - qaStatus: 'skipped'
          - qaReportUrl: null
          - qaCriticalCount: 0
          - qaWarningCount: 0
          - qaFixesApplied: []

    # Resolve origin in a separate step to avoid YAML/ternary parsing issues
    - setOriginFromInitiatedBy:
        switch:
          - condition: ${initiatedBy == "selfService"}
            next: setOriginSelfService
          - condition: ${initiatedBy == "adminPortal"}
            next: setOriginAdmin
        next: setOriginDefault

    - setOriginSelfService:
        assign:
          - originGuess: 'self-service'

    - setOriginAdmin:
        assign:
          - originGuess: 'admin'

    - setOriginDefault:
        assign:
          - originGuess: ${default(originGuess, "admin")}
          - origin: ${default(map.get(payload, "origin"), originGuess)}

    # ───────────────────────────────────────────────
    # 1-N. Print pipeline wrapped in one try/except
    # ───────────────────────────────────────────────
    - runPrintPipeline:
        try:
          steps:
            # 1. Mark run → running / generate_print_pdfs
            - markRunStarted:
                call: http.request
                args:
                  url: ${baseUrl + "/internal/runs/" + runId}
                  method: PATCH
                  auth: { type: OIDC }
                  body:
                    storyId: ${storyId}
                    status: 'running'
                    currentStep: 'generate_print_pdfs'
                    startedAt: ${time.format(sys.now())}

            # 2. Generate print PDFs
            - generatePrintPDFs:
                call: http.request
                args:
                  url: ${baseUrl + "/internal/print/generate"}
                  method: POST
                  auth: { type: OIDC }
                  body:
                    storyId: ${storyId}
                    workflowId: ${runId}
                    generateCMYK: true
                    skipQA: ${qaSkip}
                result: printGenerationResult

            # 3. Decide whether to run QA
            - checkShouldRunQA:
                switch:
                  - condition: ${qaSkip == true}
                    next: skipQualityCheck
                next: qualityCheckPDF

            - skipQualityCheck:
                assign:
                  - activePrintResult: ${printGenerationResult.body}
                next: checkShouldNotify

            - qualityCheckPDF:
                call: http.request
                args:
                  url: ${baseUrl + "/internal/print/quality-check"}
                  method: POST
                  auth: { type: OIDC }
                  body:
                    storyId: ${storyId}
                    runId: ${runId}
                    printResult: ${printGenerationResult.body}
                result: qaResult

            - setActivePrintResultFromQa:
                assign:
                  - activePrintResult: ${qaResult.body.printResult}
                  - qaStatus: ${qaResult.body.qaStatus}
                  - qaReportUrl: ${qaResult.body.reportUrl}
                  - qaCriticalCount: ${qaResult.body.criticalCount}
                  - qaWarningCount: ${qaResult.body.warningCount}
                  - qaFixesApplied: ${qaResult.body.fixesApplied}

            # 4. Notify admins if critical QA issues remain
            - checkShouldAlertAdmins:
                switch:
                  - condition: ${qaResult.body.alertNeeded == true}
                    next: notifyPrintQaAdmins
                next: checkShouldNotify

            - notifyPrintQaAdmins:
                call: http.request
                args:
                  url: ${baseUrl + "/internal/print/quality-alert"}
                  method: POST
                  auth: { type: OIDC }
                  body:
                    storyId: ${storyId}
                    runId: ${runId}
                    reportUrl: ${qaResult.body.reportUrl}
                    criticalErrors: ${qaResult.body.criticalErrors}
                    fixesApplied: ${qaResult.body.fixesApplied}
                    printResult: ${qaResult.body.printResult}
                result: qaAlertResult

            - setQaAlertSent:
                assign:
                  - qaAlertSent: ${default(qaAlertResult.body.sent, false)}

            # 5. Notify self-print customers (only for selfService with delivery info)
            - checkShouldNotify:
                switch:
                  - condition: ${origin == "self-service" and delivery != null}
                    next: notifySelfPrintCustomers
                next: markRunCompleted

            - notifySelfPrintCustomers:
                call: http.request
                args:
                  url: ${baseUrl + "/internal/print/self-service/notify"}
                  method: POST
                  auth: { type: OIDC }
                  body:
                    storyId: ${storyId}
                    runId: ${runId}
                    delivery: ${delivery}
                    initiatedBy: ${initiatedBy}
                    origin: ${origin}
                    printResult: ${activePrintResult}
                result: notificationResult

            # 6. Mark run → completed
            - markRunCompleted:
                call: http.request
                args:
                  url: ${baseUrl + "/internal/runs/" + runId}
                  method: PATCH
                  auth: { type: OIDC }
                  body:
                    storyId: ${storyId}
                    status: 'completed'
                    currentStep: 'completed'
                    endedAt: ${time.format(sys.now())}
                    metadata:
                      interiorPdfUrl: ${activePrintResult.interiorPdfUrl}
                      coverPdfUrl: ${activePrintResult.coverPdfUrl}
                      interiorCmykPdfUrl: ${activePrintResult.interiorCmykPdfUrl}
                      coverCmykPdfUrl: ${activePrintResult.coverCmykPdfUrl}
                      printQaSkipped: ${qaSkip}
                      printQaStatus: ${qaStatus}
                      printQaReportUrl: ${qaReportUrl}
                      printQaCriticalCount: ${qaCriticalCount}
                      printQaWarningCount: ${qaWarningCount}
                      printQaFixesApplied: ${qaFixesApplied}
                      printQaAlertSent: ${qaAlertSent}

        except:
          as: e
          steps:
            # Mark run → failed
            - markRunFailed:
                call: http.request
                args:
                  url: ${baseUrl + "/internal/runs/" + runId}
                  method: PATCH
                  auth: { type: OIDC }
                  body:
                    storyId: ${storyId}
                    status: 'failed'
                    currentStep: 'failed'
                    endedAt: ${time.format(sys.now())}
                    errorMessage: ${e.message}

            # Re-raise the exception
            - raiseError:
                raise: ${e}
